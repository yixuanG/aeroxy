name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild \
            -project Aeroxy.xcodeproj \
            -scheme Aeroxy \
            -configuration Debug \
            -derivedDataPath .build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

