name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcode-select -p
      - name: Build
        run: |
          xcodebuild \
            -project Aeroxy.xcodeproj \
            -scheme Aeroxy \
            -configuration Debug \
            -derivedDataPath .build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
